<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Projects — Coming Soon · Dylan Drake</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Mono:wght@300;400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f5f3ef;
    --surface: #edeae4;
    --ink: #1a1916;
    --ink-mid: #4a4843;
    --ink-light: #8a8783;
    --accent: #c85a2a;
    --rule: #d5d1c8;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--ink);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }
  nav {
    display: flex; align-items: center; justify-content: space-between;
    padding: 1.2rem 3rem;
    border-bottom: 1px solid var(--rule);
  }
  .nav-back {
    font-family: 'DM Mono', monospace;
    font-size: 0.78rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    text-decoration: none;
    color: var(--ink-mid);
    transition: color 0.2s;
  }
  .nav-back:hover { color: var(--accent); }
  .hero-bg {
    position: fixed; inset: 0; z-index: 0;
    background-image:
      linear-gradient(var(--rule) 1px, transparent 1px),
      linear-gradient(90deg, var(--rule) 1px, transparent 1px);
    background-size: 60px 60px;
    opacity: 0.4;
    pointer-events: none;
  }
  main {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 4rem 2rem;
    position: relative; z-index: 1;
  }
  .wip-label {
    font-family: 'DM Mono', monospace;
    font-size: 0.75rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 1.5rem;
  }
  h1 {
    font-family: 'DM Serif Display', serif;
    font-size: clamp(2.8rem, 8vw, 5.5rem);
    line-height: 1.05;
    color: var(--ink);
    margin-bottom: 1.5rem;
  }
  h1 em { font-style: italic; color: var(--accent); }
  .sub {
    font-size: 1.05rem;
    font-weight: 300;
    color: var(--ink-mid);
    max-width: 440px;
    line-height: 1.8;
    margin-bottom: 3rem;
  }
  .divider {
    width: 40px; height: 1px;
    background: var(--rule);
    margin: 0 auto 3rem;
  }
  .contact-label {
    font-family: 'DM Mono', monospace;
    font-size: 0.72rem;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--ink-light);
    margin-bottom: 1rem;
  }
  .contact-links {
    display: flex; flex-direction: column;
    gap: 0.75rem; align-items: center;
  }
  .contact-link {
    font-family: 'DM Mono', monospace;
    font-size: 0.85rem;
    letter-spacing: 0.06em;
    color: var(--ink-mid);
    text-decoration: none;
    display: flex; align-items: center; gap: 0.5rem;
    transition: color 0.2s;
  }
  .contact-link:hover { color: var(--accent); }
  .back-btn {
    margin-top: 4rem;
    display: inline-flex; align-items: center; gap: 0.5rem;
    padding: 0.85rem 1.8rem;
    background: var(--ink);
    color: var(--bg);
    font-family: 'DM Mono', monospace;
    font-size: 0.78rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    text-decoration: none;
    transition: background 0.2s;
  }
  .back-btn:hover { background: var(--accent); }
</style>
</head>
<body>
<div class="hero-bg"></div>
<nav>
  <a href="index.html" class="nav-back">← Back to Portfolio</a>
</nav>

  <p class="sub">More project pages are on the way. In the meantime, feel free to reach out if you have any questions.</p>
